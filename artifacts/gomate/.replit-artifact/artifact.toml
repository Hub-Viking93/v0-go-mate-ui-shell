kind = "web"
previewPath = "/"
title = "GoMate - Relocation Assistant"
version = "1.0.0"
id = "artifacts/gomate"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23722

[services.development]
run = "pnpm --filter @workspace/gomate run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gomate", "run", "build" ]
publicDir = "artifacts/gomate/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23722"
BASE_PATH = "/"
