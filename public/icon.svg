<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
    }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0F172A; }
    }
  </style>
  <rect class="bg" width="180" height="180" rx="37"/>
  <g transform="translate(90, 90)">
    <!-- Globe circle -->
    <circle r="54" stroke="#22C55E" stroke-width="8" fill="none"/>
    <!-- Globe meridian (vertical ellipse) -->
    <ellipse rx="24" ry="54" stroke="#22C55E" stroke-width="5.5" fill="none"/>
    <!-- Globe latitude lines -->
    <line x1="-52" y1="-18" x2="52" y2="-18" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
    <line x1="-54" y1="0" x2="54" y2="0" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
    <line x1="-52" y1="18" x2="52" y2="18" stroke="#22C55E" stroke-width="5" stroke-linecap="round"/>
    <!-- Swooping arc trail (airplane path) -->
    <path d="M 58,-20 Q 72,10 50,45" stroke="#1B3A2D" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Airplane at end of arc -->
    <g transform="translate(50,45) rotate(120)">
      <path d="M0,-14 L4,-4 L12,0 L4,2 L2,10 L0,4 L-2,10 L-4,2 L-12,0 L-4,-4 Z" fill="#1B3A2D"/>
    </g>
  </g>
</svg>
